<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="100%" height="100%">
  <defs>
    <!-- Outer Aura glowing gradient -->
    <linearGradient id="auraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
    <!-- Inner Core gradient -->
    <linearGradient id="coreGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Aura Ring (Glowing Security Boundary) -->
  <circle cx="50" cy="50" r="38" stroke="url(#auraGrad)" stroke-width="4" stroke-linecap="round" stroke-dasharray="160 50" filter="url(#glow)" />
  
  <!-- Secondary inner thin orbit ring -->
  <circle cx="50" cy="50" r="28" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" stroke-dasharray="5 5" />
  
  <!-- Inner Hexagonal Secure Sandbox Core -->
  <polygon points="50,22 74,36 74,64 50,78 26,64 26,36" fill="url(#coreGrad)" opacity="0.9" />
  
  <!-- Stylized Geometric "A" within the Core -->
  <path d="M50,33 L62,59 M50,33 L38,59 M42,51 L58,51 M50,33 L50,59" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
</svg>