<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="100%" height="100%">
  <defs>
    <!-- Glowing gradients -->
    <linearGradient id="auraLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="auraRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
    <linearGradient id="auraCenter" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    <!-- Soft background glow for contrast and high-end feel -->
    <filter id="halo" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
    </filter>
  </defs>

  <!-- Ambient backing glow -->
  <circle cx="50" cy="50" r="32" fill="#00F0FF" opacity="0.15" filter="url(#halo)" />

  <!-- Left wing of Delta (representing Agent performance and security boundary) -->
  <path d="M 50 12 L 12 88 L 36 88 L 50 46 Z" fill="url(#auraLeft)" />

  <!-- Right wing of Delta -->
  <path d="M 50 12 L 50 46 L 64 88 L 88 88 Z" fill="url(#auraRight)" />

  <!-- Floating glowing energy diamond in the center (representing the Core Runtime / Sandbox) -->
  <path d="M 50 40 L 58 53 L 50 66 L 42 53 Z" fill="url(#auraCenter)" />
</svg>